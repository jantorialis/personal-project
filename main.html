<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content=""width=device-width, initial scale="1.0, maximum-scale=1.0, viewport-fit=contain">
        <title>entrance</title>
        <link rel="icon" href="/favicon.ico" type="image/x-icon">
        <style>
            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
                font-family: 'Times New Roman', Times, serif;
            }

            .entrance-page { 
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-image: url('/assets/sky.png');
                background-size: cover;
                background-position: center;
            }

            .entrance-message {
                position: absolute;
                top: 50%;
                left: 10%;
                transform: translateY(-50%);
                z-index: 20;
                text-align: left;
                max-width: 600px;
            }

            .entrance-title {
                font-size: 5rem;
                color: #000080;
                margin: 0;
                line-height: 1.1;
                letter-spacing: 2px;
                font-weight: bold;
            }

            .entrance-subtitle {
                font-size: 2rem;
                color: #000080;
                margin: 10px 0 20px 0;
                font-style: italic;
            }

            .entrance-instruction {
                font-size: 1.5rem;
                color: #000080;
                margin: 0;
                border-bottom: 1px dotted #000080;
                display: inline-block;
                padding-bottom: 5px;
            }

            #spin-container {
                position: absolute;
                bottom: 5%;
                right: 5%;
                width: 600px;
                height: 600px;
                max-width: 50vw;
                max-height: 50vw;
                z-index: 30;
                cursor: pointer;
            }

            #spin-canvas {
                width: 100%;
                height: 100%;
                display: block;
            }

            @media screen {
                .entrance-title { 
                    font-size: 3rem;
                }
                .entrance-subtitle {
                    font-size: 1.5rem;
                }
                .entrance-instruction {
                    left: 5%;
                    right: 5%;
                    text-align: center;
                }
                #spin-container {
                    width: 400px;
                    height: 400px;
                }
            }

            @media screen {
                .entrance-title {
                    font-size: 2.2rem;
                }
                #spin-container {
                    width: 250px;
                    height: 250px;
                    bottom: 10%;
                    right: 50%;
                    translate: translateX(50%);
                }
            }
        </style>

    </head>
    <body>
        <div class="entrance-page">
            <div class="entrance-message">
                <h1 class="entrance-title">entrance</h1>
                
    </body>
</html>
